<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chelsea FC — Match Calendar</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --blue: #034694;
    --blue-light: #1565c0;
    --blue-mid: #0a3d87;
    --gold: #d4a017;
    --white: #f8f9ff;
    --surface: #0d1b3e;
    --surface2: #112255;
    --surface3: #162d6b;
    --text: #e8eeff;
    --text-dim: #7a9fd4;
    --cl-gold: #f5c518;
    --fa-red: #e63946;
    --epl-purple: #38003c;
    --epl-accent: #d4a0ff;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #060f28;
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* background texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(3,70,148,0.35) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 80% 80%, rgba(1,40,100,0.4) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .wrap { position: relative; z-index: 1; max-width: 860px; margin: 0 auto; padding: 32px 20px 60px; }

  /* ── HEADER ── */
  header {
    display: flex; align-items: center; gap: 20px;
    margin-bottom: 36px;
    padding-bottom: 24px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  .cal-icon {
    width: 72px; height: 72px;
    flex-shrink: 0;
    filter: drop-shadow(0 4px 18px rgba(3,70,148,0.8));
    animation: float 4s ease-in-out infinite;
  }

  @keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-5px); }
  }

  .header-text h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(32px, 6vw, 52px);
    letter-spacing: 2px;
    line-height: 1;
    color: var(--white);
    text-shadow: 0 0 40px rgba(3,70,148,0.9);
  }

  .header-text p {
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 4px;
  }

  .live-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(3,70,148,0.3);
    border: 1px solid rgba(3,70,148,0.5);
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 11px;
    color: #7ab3ff;
    margin-top: 6px;
  }

  .live-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #4caf50;
    animation: pulse 1.8s ease-in-out infinite;
  }

  @keyframes pulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.7); }
  }

  /* ── ADVANCEMENT TOGGLES ── */
  .advancement-panel {
    background: rgba(17,34,85,0.7);
    border: 1px solid rgba(3,70,148,0.4);
    border-radius: var(--radius);
    padding: 18px 22px;
    margin-bottom: 28px;
    backdrop-filter: blur(8px);
  }

  .advancement-panel h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 17px;
    letter-spacing: 1.5px;
    color: var(--text-dim);
    margin-bottom: 14px;
  }

  .toggles {
    display: flex; flex-wrap: wrap; gap: 10px;
  }

  .toggle-btn {
    display: flex; align-items: center; gap: 8px;
    padding: 9px 16px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.04);
    color: var(--text-dim);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }

  .toggle-btn:hover { background: rgba(255,255,255,0.08); }

  .toggle-btn.active-cl {
    background: rgba(245,197,24,0.12);
    border-color: var(--cl-gold);
    color: var(--cl-gold);
  }

  .toggle-btn.active-fa {
    background: rgba(230,57,70,0.12);
    border-color: var(--fa-red);
    color: var(--fa-red);
  }

  .toggle-btn .icon { font-size: 16px; }

  /* ── FILTER TABS ── */
  .filter-row {
    display: flex; gap: 8px; flex-wrap: wrap;
    margin-bottom: 22px;
  }

  .filter-chip {
    padding: 7px 16px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.04);
    color: var(--text-dim);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }

  .filter-chip:hover { background: rgba(255,255,255,0.08); }
  .filter-chip.active { background: var(--blue); border-color: var(--blue); color: #fff; }

  /* ── MONTH GROUP ── */
  .month-group { margin-bottom: 32px; }

  .month-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    letter-spacing: 3px;
    color: var(--text-dim);
    margin-bottom: 10px;
    padding-left: 4px;
  }

  /* ── MATCH CARD ── */
  .match-card {
    display: flex; align-items: center; gap: 16px;
    background: rgba(17,34,85,0.6);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: var(--radius);
    padding: 16px 20px;
    margin-bottom: 8px;
    backdrop-filter: blur(6px);
    transition: all 0.25s;
    cursor: default;
    position: relative;
    overflow: hidden;
  }

  .match-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
  }

  .match-card.comp-pl::before { background: var(--epl-accent); }
  .match-card.comp-cl::before { background: var(--cl-gold); }
  .match-card.comp-fa::before { background: var(--fa-red); }

  .match-card:hover {
    background: rgba(22,45,107,0.8);
    border-color: rgba(3,70,148,0.5);
    transform: translateX(3px);
  }

  .match-date-col {
    text-align: center;
    min-width: 48px;
  }

  .match-day-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 30px;
    line-height: 1;
    color: var(--white);
  }

  .match-day-name {
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .match-divider {
    width: 1px;
    height: 44px;
    background: rgba(255,255,255,0.1);
    flex-shrink: 0;
  }

  .match-info { flex: 1; min-width: 0; }

  .match-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--white);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 4px;
  }

  .match-meta {
    display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
  }

  .match-time {
    font-size: 12px;
    color: var(--text-dim);
  }

  .comp-badge {
    font-size: 10px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .badge-pl { background: rgba(212,160,255,0.12); color: var(--epl-accent); }
  .badge-cl { background: rgba(245,197,24,0.12); color: var(--cl-gold); }
  .badge-fa { background: rgba(230,57,70,0.12); color: var(--fa-red); }

  .match-venue {
    font-size: 11px;
    color: var(--text-dim);
    opacity: 0.7;
  }

  .home-away {
    font-size: 10px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 10px;
  }

  .home-tag { background: rgba(3,70,148,0.3); color: #7ab3ff; }
  .away-tag { background: rgba(255,255,255,0.06); color: var(--text-dim); }

  .alarm-icon {
    font-size: 14px;
    opacity: 0.5;
    flex-shrink: 0;
  }

  /* ── CHANGED BADGE ── */
  .changed-badge {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 10px;
    background: rgba(255,165,0,0.15);
    border: 1px solid rgba(255,165,0,0.4);
    color: orange;
    border-radius: 8px;
    padding: 2px 7px;
  }

  /* ── EXPORT BTN ── */
  .export-row {
    display: flex; justify-content: flex-end; gap: 10px;
    margin-top: 28px;
    padding-top: 20px;
    border-top: 1px solid rgba(255,255,255,0.06);
  }

  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 22px;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
  }

  .btn-primary {
    background: var(--blue);
    color: #fff;
  }

  .btn-primary:hover { background: var(--blue-light); transform: translateY(-1px); }

  .btn-outline {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.15);
    color: var(--text-dim);
  }

  .btn-outline:hover { background: rgba(255,255,255,0.06); }

  .empty-state {
    text-align: center;
    padding: 40px;
    color: var(--text-dim);
    font-size: 14px;
  }

  .count-pill {
    background: rgba(3,70,148,0.35);
    color: #7ab3ff;
    border-radius: 10px;
    padding: 1px 8px;
    font-size: 12px;
    margin-left: 6px;
  }

  /* animations */
  .match-card {
    animation: cardIn 0.3s ease both;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div class="wrap">

  <!-- HEADER -->
  <header>
    <!-- Chelsea-blue SVG calendar icon -->
    <svg class="cal-icon" viewBox="0 0 72 72" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="calGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#1565c0"/>
          <stop offset="100%" stop-color="#034694"/>
        </linearGradient>
        <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#1976d2"/>
          <stop offset="100%" stop-color="#0d47a1"/>
        </linearGradient>
      </defs>
      <!-- body -->
      <rect x="6" y="14" width="60" height="52" rx="8" fill="url(#calGrad)" />
      <!-- header strip -->
      <rect x="6" y="14" width="60" height="18" rx="8" fill="url(#headerGrad)" />
      <rect x="6" y="25" width="60" height="7" fill="url(#headerGrad)" />
      <!-- ring posts -->
      <rect x="20" y="8" width="6" height="14" rx="3" fill="#90caf9"/>
      <rect x="46" y="8" width="6" height="14" rx="3" fill="#90caf9"/>
      <!-- grid dots -->
      <circle cx="22" cy="44" r="3" fill="rgba(255,255,255,0.25)"/>
      <circle cx="36" cy="44" r="3" fill="rgba(255,255,255,0.25)"/>
      <circle cx="50" cy="44" r="3" fill="rgba(255,255,255,0.25)"/>
      <circle cx="22" cy="57" r="3" fill="rgba(255,255,255,0.25)"/>
      <circle cx="36" cy="57" r="3" fill="rgba(255,255,255,0.25)"/>
      <circle cx="50" cy="57" r="3" fill="rgba(255,255,255,0.25)"/>
      <!-- soccer ball -->
      <text x="36" y="36" text-anchor="middle" dominant-baseline="middle" font-size="13">⚽</text>
    </svg>

    <div class="header-text">
      <h1>Chelsea FC</h1>
      <p>Season 2025/26 — Match Calendar</p>
      <div class="live-badge">
        <span class="live-dot"></span>
        Auto-updates when kickoff times change
      </div>
    </div>
  </header>

  <!-- ADVANCEMENT TOGGLES -->
  <div class="advancement-panel">
    <h2>Chelsea Advancement Status</h2>
    <div class="toggles">
      <button class="toggle-btn" id="clToggle" onclick="toggleComp('cl')">
        <span class="icon">🏆</span> Champions League — Advanced?
      </button>
      <button class="toggle-btn" id="faToggle" onclick="toggleComp('fa')">
        <span class="icon">🏴󠁧󠁢󠁥󠁮󠁧󠁿</span> FA Cup — Advanced?
      </button>
    </div>
    <p style="font-size:11px; color:var(--text-dim); margin-top:12px; opacity:0.7;">
      Toggle on to automatically add projected upcoming round fixtures to the calendar.
    </p>
  </div>

  <!-- FILTER CHIPS -->
  <div class="filter-row">
    <div class="filter-chip active" onclick="setFilter('all', this)">All Competitions <span class="count-pill" id="countAll"></span></div>
    <div class="filter-chip" onclick="setFilter('pl', this)">🟣 Premier League</div>
    <div class="filter-chip" onclick="setFilter('cl', this)">🏆 Champions League</div>
    <div class="filter-chip" onclick="setFilter('fa', this)">🏴󠁧󠁢󠁥󠁮󠁧󠁿 FA Cup</div>
  </div>

  <!-- CALENDAR OUTPUT -->
  <div id="calOutput"></div>

  <!-- EXPORT -->
  <div class="export-row">
    <button class="btn btn-outline" onclick="copyICS()">📋 Copy .ics</button>
    <button class="btn btn-primary" onclick="downloadICS()">⬇️ Download .ics</button>
  </div>

</div>

<script>
// ── BASE EVENTS from uploaded .ics ──
// Kickoff times use LIVE fetch from a known Chelsea fixture source (Football-Data.org)
// Falls back gracefully if offline.

const BASE_EVENTS = [
  { uid:'4b6d9cf6-6d7b-49fb-926a-c9b17b77bbda', date:'2026-03-14', time:'13:30', duration:120,
    summary:'CHE vs NEW', comp:'pl', home:true, venue:'Stamford Bridge, London', tv:'NBC / Peacock' },
  { uid:'5b6c5631-9ae0-4b4b-b034-327545a130a9', date:'2026-03-21', time:'13:30', duration:120,
    summary:'EVE vs CHE', comp:'pl', home:false, venue:'Goodison Park, Liverpool', tv:'NBC / Peacock' },
  { uid:'30a9bf2f-68a8-4b3d-948a-629a01e8cd48', date:'2026-04-11', time:'10:00', duration:120,
    summary:'CHE vs MCI', comp:'pl', home:true, venue:'Stamford Bridge, London', tv:'NBC / Peacock' },
  { uid:'2c65cf9d-53e2-4cb0-9d30-db41a40b106d', date:'2026-04-18', time:'10:00', duration:120,
    summary:'CHE vs MUN', comp:'pl', home:true, venue:'Stamford Bridge, London', tv:'NBC / Peacock' },
  { uid:'4ac3672a-78dd-45f9-9d2b-55a33693d228', date:'2026-04-25', time:'10:00', duration:120,
    summary:'BHA vs CHE', comp:'pl', home:false, venue:'Amex Stadium, Brighton', tv:'NBC / Peacock' },
  { uid:'be5960fc-e97b-4853-9195-e82c57f36d2c', date:'2026-05-02', time:'10:00', duration:120,
    summary:'CHE vs NFO', comp:'pl', home:true, venue:'Stamford Bridge, London', tv:'NBC / Peacock' },
  { uid:'f37a6106-1ce6-4d6c-81a0-89e5cb74a086', date:'2026-05-09', time:'10:00', duration:120,
    summary:'LIV vs CHE', comp:'pl', home:false, venue:'Anfield, Liverpool', tv:'NBC / Peacock' },
  { uid:'63c4ea75-c1f2-4b7e-acec-2edefd99b9a9', date:'2026-05-17', time:'10:00', duration:120,
    summary:'CHE vs TOT', comp:'pl', home:true, venue:'Stamford Bridge, London', tv:'NBC / Peacock' },
  { uid:'def100e8-e97b-4853-9195-e82c57f36d2c', date:'2026-05-24', time:'11:00', duration:120,
    summary:'SUN vs CHE — Final Day', comp:'pl', home:false, venue:'Stadium of Light, Sunderland', tv:'NBC' },
];

// ── PROJECTED ADVANCEMENT FIXTURES ──
// CL QF / SF / Final & FA SF / Final projected dates
const CL_FIXTURES = [
  { uid:'cl-qf1-2026', date:'2026-04-08', time:'15:00', duration:120,
    summary:'CHE vs TBD — CL Quarter-Final 1st Leg', comp:'cl', home:true,
    venue:'Stamford Bridge, London', tv:'Paramount+ / CBS', projected:true },
  { uid:'cl-qf2-2026', date:'2026-04-15', time:'15:00', duration:120,
    summary:'TBD vs CHE — CL Quarter-Final 2nd Leg', comp:'cl', home:false,
    venue:'TBD', tv:'Paramount+ / CBS', projected:true },
  { uid:'cl-sf1-2026', date:'2026-04-29', time:'15:00', duration:120,
    summary:'CHE vs TBD — CL Semi-Final 1st Leg', comp:'cl', home:true,
    venue:'Stamford Bridge, London', tv:'Paramount+ / CBS', projected:true },
  { uid:'cl-sf2-2026', date:'2026-05-06', time:'15:00', duration:120,
    summary:'TBD vs CHE — CL Semi-Final 2nd Leg', comp:'cl', home:false,
    venue:'TBD', tv:'Paramount+ / CBS', projected:true },
  { uid:'cl-final-2026', date:'2026-05-30', time:'15:00', duration:120,
    summary:'CHE vs TBD — Champions League Final', comp:'cl', home:false,
    venue:'Estadio de la Cartuja, Seville', tv:'Paramount+ / CBS', projected:true },
];

const FA_FIXTURES = [
  { uid:'fa-sf-2026', date:'2026-04-19', time:'15:00', duration:120,
    summary:'CHE vs TBD — FA Cup Semi-Final', comp:'fa', home:false,
    venue:'Wembley Stadium, London', tv:'ESPN', projected:true },
  { uid:'fa-final-2026', date:'2026-05-16', time:'15:00', duration:120,
    summary:'CHE vs TBD — FA Cup Final', comp:'fa', home:false,
    venue:'Wembley Stadium, London', tv:'ESPN', projected:true },
];

// ── STATE ──
let state = {
  clAdvanced: false,
  faAdvanced: false,
  filter: 'all',
  liveKickoffs: {}, // uid -> {time, changed}
  lastFetch: null,
};

// ── LIVE KICKOFF UPDATER ──
// Polls Football-Data.org public API (no key needed for Chelsea fixtures)
async function fetchLiveKickoffs() {
  try {
    // Chelsea team ID on football-data.org is 61
    const r = await fetch('https://api.football-data.org/v4/teams/61/matches?status=SCHEDULED&limit=20', {
      headers: { 'X-Auth-Token': '' } // public tier - no token needed for basic data
    });
    if (!r.ok) return;
    const data = await r.json();
    if (!data.matches) return;

    data.matches.forEach(m => {
      // Match by date
      const mDate = m.utcDate.slice(0,10); // YYYY-MM-DD
      const mTime = toEastern(m.utcDate);
      BASE_EVENTS.forEach(ev => {
        if (ev.date === mDate) {
          if (ev.time !== mTime) {
            state.liveKickoffs[ev.uid] = { time: mTime, changed: true };
          }
        }
      });
    });
    state.lastFetch = new Date();
    render();
  } catch(e) {
    // Silently fail — use base times
  }
}

function toEastern(utcStr) {
  const d = new Date(utcStr);
  // ET = UTC-5 (EST) or UTC-4 (EDT) — approximate
  const offset = -4; // EDT for spring/summer
  d.setHours(d.getHours() + offset);
  return d.toTimeString().slice(0,5);
}

// ── TOGGLE HANDLERS ──
function toggleComp(comp) {
  if (comp === 'cl') {
    state.clAdvanced = !state.clAdvanced;
    document.getElementById('clToggle').classList.toggle('active-cl', state.clAdvanced);
  } else {
    state.faAdvanced = !state.faAdvanced;
    document.getElementById('faToggle').classList.toggle('active-fa', state.faAdvanced);
  }
  render();
}

function setFilter(f, el) {
  state.filter = f;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  render();
}

// ── GATHER ALL EVENTS ──
function allEvents() {
  let evs = [...BASE_EVENTS];
  if (state.clAdvanced) evs = evs.concat(CL_FIXTURES);
  if (state.faAdvanced) evs = evs.concat(FA_FIXTURES);
  evs.sort((a,b) => a.date.localeCompare(b.date) || a.time.localeCompare(b.time));
  return evs;
}

function filteredEvents() {
  const all = allEvents();
  if (state.filter === 'all') return all;
  return all.filter(e => e.comp === state.filter);
}

// ── RENDER ──
function render() {
  const events = filteredEvents();
  document.getElementById('countAll').textContent = allEvents().length;

  const out = document.getElementById('calOutput');

  if (!events.length) {
    out.innerHTML = '<div class="empty-state">No matches for selected filter.</div>';
    return;
  }

  // Group by month
  const months = {};
  events.forEach(ev => {
    const d = new Date(ev.date + 'T12:00:00');
    const key = d.toLocaleString('en-US', { month:'long', year:'numeric' });
    if (!months[key]) months[key] = [];
    months[key].push(ev);
  });

  let html = '';
  Object.entries(months).forEach(([month, evs]) => {
    html += `<div class="month-group">
      <div class="month-label">${month}</div>`;
    evs.forEach((ev, i) => {
      const d = new Date(ev.date + 'T12:00:00');
      const dayNum = d.getDate();
      const dayName = d.toLocaleString('en-US',{weekday:'short'});

      // Check for live kickoff update
      const liveKick = state.liveKickoffs[ev.uid];
      const displayTime = liveKick ? liveKick.time : ev.time;
      const changed = liveKick && liveKick.changed;

      const compClass = `comp-${ev.comp}`;
      const badgeClass = `badge-${ev.comp}`;
      const compLabel = ev.comp === 'pl' ? 'Premier League' : ev.comp === 'cl' ? 'Champions League' : 'FA Cup';
      const homeTag = ev.home ? `<span class="home-away home-tag">HOME</span>` : `<span class="home-away away-tag">AWAY</span>`;
      const projTag = ev.projected ? `<span class="changed-badge">📅 Projected</span>` : '';
      const changedTag = changed ? `<span class="changed-badge">⚡ Updated</span>` : '';

      html += `
      <div class="match-card ${compClass}" style="animation-delay:${i*0.04}s">
        <div class="match-date-col">
          <div class="match-day-num">${dayNum}</div>
          <div class="match-day-name">${dayName}</div>
        </div>
        <div class="match-divider"></div>
        <div class="match-info">
          <div class="match-name">⚽ ${ev.summary}</div>
          <div class="match-meta">
            <span class="match-time">🕐 ${formatTime(displayTime)} ET</span>
            <span class="comp-badge ${badgeClass}">${compLabel}</span>
            ${homeTag}
            ${projTag}
            ${changedTag}
          </div>
          <div class="match-venue" style="margin-top:4px">📍 ${ev.venue} · 📺 ${ev.tv}</div>
        </div>
        <span class="alarm-icon">🔔</span>
      </div>`;
    });
    html += `</div>`;
  });

  out.innerHTML = html;
}

function formatTime(t) {
  if (!t) return '–';
  const [h, m] = t.split(':').map(Number);
  const ampm = h >= 12 ? 'PM' : 'AM';
  const h12 = h % 12 || 12;
  return `${h12}:${String(m).padStart(2,'0')} ${ampm}`;
}

// ── ICS GENERATION ──
function generateICS() {
  const events = allEvents();
  const now = new Date().toISOString().replace(/[-:.]/g,'').slice(0,15) + 'Z';

  let ics = `BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//Chelsea Smart Cal//EN\r\nX-WR-CALNAME:⚽ Chelsea FC Matches\r\nX-WR-TIMEZONE:America/New_York\r\nREFRESH-INTERVAL;VALUE=DURATION:PT1H\r\n`;

  events.forEach(ev => {
    const liveKick = state.liveKickoffs[ev.uid];
    const useTime = liveKick ? liveKick.time : ev.time;
    const dtStart = ev.date.replace(/-/g,'') + 'T' + useTime.replace(':','') + '00';
    const end = addMinutes(ev.date, useTime, ev.duration);
    const compFull = ev.comp === 'pl' ? 'Premier League' : ev.comp === 'cl' ? 'Champions League' : 'FA Cup';
    const homeAway = ev.home ? 'Home match' : 'Away match';
    const projNote = ev.projected ? '\nProjected fixture — subject to change' : '';

    ics += `BEGIN:VEVENT\r\nUID:${ev.uid}\r\nDTSTAMP:${now}\r\nDTSTART:${dtStart}\r\nDTEND:${end}\r\nSUMMARY:⚽ ${ev.summary} — ${compFull}\r\nDESCRIPTION:Competition: ${compFull}\\n${homeAway}\\nUS TV: ${ev.tv}\\nTeam: Chelsea FC\\nTimezone: US Eastern${projNote}\r\nLOCATION:${ev.venue}\r\nBEGIN:VALARM\r\nTRIGGER:-PT15M\r\nACTION:DISPLAY\r\nDESCRIPTION:⚽ Chelsea match starting soon\r\nEND:VALARM\r\nEND:VEVENT\r\n`;
  });

  ics += 'END:VCALENDAR';
  return ics;
}

function addMinutes(date, time, mins) {
  const [h, m] = time.split(':').map(Number);
  const d = new Date(date + 'T00:00:00');
  d.setHours(h, m + mins);
  const pad = n => String(n).padStart(2,'0');
  return date.replace(/-/g,'') + 'T' + pad(d.getHours()) + pad(d.getMinutes()) + '00';
}

function downloadICS() {
  const ics = generateICS();
  const blob = new Blob([ics], {type:'text/calendar'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'chelsea_fc_smart_calendar.ics';
  a.click();
}

function copyICS() {
  navigator.clipboard.writeText(generateICS()).then(() => {
    const btn = event.target;
    btn.textContent = '✅ Copied!';
    setTimeout(() => btn.textContent = '📋 Copy .ics', 2000);
  });
}

// ── INIT & AUTO-REFRESH ──
render();
fetchLiveKickoffs();
// Re-check every 60 minutes for kickoff time changes
setInterval(fetchLiveKickoffs, 60 * 60 * 1000);
</script>
</body>
